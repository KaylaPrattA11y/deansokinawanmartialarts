# Build settings: runs the Astro build and deploys the "dist" output folder
[build]
  command = "npm run build"
  publish = "dist"

# Local dev settings: runs the Astro dev server on port 4321
[dev]
  command = "npm run dev"
  targetPort = 4321

# Mailgun plugin for custom email domain
[[plugins]]
  package = "@netlify/plugin-emails"

# Redirect /sitemap.xml to /sitemap-index.xml (Astro's default sitemap name)
# so bots looking for the common path still find it
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301

# Cache Astro's hashed static assets (JS, CSS, fonts) for 1 year
# "immutable" tells browsers these files will never change (the hash changes instead)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 year
[[headers]]
  for = "images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
