[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 4321

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/tina/*"
  to = "/.netlify/functions/tina/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/cloudinary/media*"
  to = "/.netlify/functions/cloudinary/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200